
version: '3.8'

services:
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: mqtt-broker
    ports:
      - "8883:8883"
      - "8884:8884"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./mosquitto/config/acl:/mosquitto/config/acl:ro
      - ./mosquitto/certs:/mosquitto/certs:ro
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    networks:
      - mqtt-network
    restart: unless-stopped

  # Subscriber service
  subscriber:
    build:
      context: ./subscriber
      dockerfile: Dockerfile
    container_name: mqtt-subscriber
    env_file:
      - .env
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=8883
      - CA_CERT=/certs/ca.crt
      - CLIENT_CERT=/certs/subscriber-service.crt
      - CLIENT_KEY=/certs/subscriber-service.key
    volumes:
      - ./mosquitto/certs:/certs:ro
    depends_on:
      - mosquitto
    networks:
      - mqtt-network
    restart: unless-stopped

  # Actuation service
  actuation:
    build:
      context: ./actuation
      dockerfile: Dockerfile
    container_name: mqtt-actuation
    env_file:
      - .env
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=8883
      - MQTT_TOPICS=devices/+/water_level
      - CA_CERT=/certs/ca.crt
      - CLIENT_CERT=/certs/actuation-service.crt
      - CLIENT_KEY=/certs/actuation-service.key
    volumes:
      - ./mosquitto/certs:/certs:ro
    depends_on:
      - mosquitto
    networks:
      - mqtt-network
    restart: unless-stopped

networks:
  mqtt-network:
    name: mqtt-network
    driver: bridge