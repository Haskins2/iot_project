# =======================
# MOSQUITTO CONFIGURATION 
# =======================

# Listener configuration
listener 8883
protocol mqtt

# mTLS 
# Both sides present certificates signed by the same CA.
# Broker cert proves broker identity to devices.
# Device cert proves device identity to broker.
cafile   /mosquitto/certs/ca.crt
certfile /mosquitto/certs/broker.crt
keyfile  /mosquitto/certs/broker.key
tls_version tlsv1.3

# Require every client to present a valid certificate
require_certificate true

# Map the CN of the client cert to the MQTT username
# e.g. CN=esp-a1b2c3 → username "esp-a1b2c3"
# The ACL file then uses %u to scope that username to its own topics
use_identity_as_username true

# ACL
# Plain text file 
# %u is substituted with the connecting client's username (= cert CN)
acl_file /mosquitto/config/acl
 
allow_anonymous false

# Security
max_connections 100
max_inflight_messages 20
# Message size limit (10MB)
message_size_limit 10485760

# Persistence
persistence false
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# Connection messages
connection_messages true

# Timestamp log entries
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# Maximum QoS
max_qos 1

# Auto-save interval (seconds)
autosave_interval 300

