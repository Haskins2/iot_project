# ============================================================================
# MOSQUITTO CONFIGURATION - LOCAL DEVELOPMENT ONLY
# ============================================================================
# WARNING: This configuration allows anonymous connections without authentication.
# DO NOT USE IN PRODUCTION. For production, enable authentication with:
#   allow_anonymous false
#   password_file /mosquitto/config/passwd
# ============================================================================

# Listener configuration
listener 1883
protocol mqtt

# Security
max_connections 100
max_inflight_messages 20
# Message size limit (10MB)
message_size_limit 10485760
allow_anonymous false
password_file /mosquitto/config/passwd

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# Connection messages
connection_messages true

# Timestamp log entries
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# Maximum QoS
max_qos 2

# Auto-save interval (seconds)
autosave_interval 300

