# ------------------------------------
# MOSQUITTO CONFIGURATION 
# TLS on 8883, auth done with dynsec
# ------------------------------------

# Listener configuration

listener 8883
protocol mqtt

# TLS (one-way — device verifies broker, broker does not require client cert) 
cafile   /mosquitto/certs/ca.crt
certfile /mosquitto/certs/broker.crt
keyfile  /mosquitto/certs/broker.key
tls_version tlsv1.3

# Dynamic Security plugin
# Replaces the static passwd file entirely.
# Credentials and ACLs are managed at runtime via $CONTROL/dynamic-security/v1
plugin /usr/lib/mosquitto_dynamic_security.so
plugin_opt_config_file /mosquitto/config/dynsec.json

allow_anonymous false

#Limits 
max_connections 20
max_inflight_messages 20
message_size_limit 10485760
max_queued_messages 1000    # To stop infinite growing persistence

# Persistence
persistence true
persistence_location /mosquitto/data/

# --- Logging ---
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
connection_messages true
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

max_qos   2
autosave_interval 300
