name: Build ESP32-C6 Firmware

on:
  push:
    branches: [main]
    paths:
      - 'embedded_systems/esp32c6/**'
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.2.1   # match your local version
          target: esp32c6
          path: embedded_systems/esp32c6

      - name: Get version from sdkconfig
        id: version
        run: |
          VERSION=$(grep "CONFIG_APP_PROJECT_VER=" embedded_systems/esp32c6/sdkconfig | cut -d'"' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create version.json
        run: |
          echo '{"version": "${{ steps.version.outputs.version }}"}' > version.json

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: |
            embedded_systems/esp32c6/build/esp32c6.bin
            version.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}